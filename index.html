<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Puppy Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>
</head>

<body style="font-family:sans-serif; padding:20px;">

<h2>🐾 Puppy Weight Tracker</h2>

<button id="loginBtn">Login with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<hr>

<select id="puppy">
  <option>Green</option>
  <option>Pink</option>
  <option>Orange</option>
  <option>Blue</option>
  <option>White</option>
  <option>Yellow</option>
  <option>Red</option>
</select>

<input type="number" id="weight" placeholder="Weight (g)">
<button id="addBtn">Add Entry</button>

<h3>Entries</h3>
<ul id="list"></ul>

<script>
  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDVl0emjzWd450LvuOCTNs-D3yU0lwy4UA",
    authDomain: "puppy-app-41bf0.firebaseapp.com",
    databaseURL: "https://puppy-app-41bf0-default-rtdb.firebaseio.com",
    projectId: "puppy-app-41bf0",
    appId: "1:958889040689:web:694feb88aca77cb2fbae10"
  };

  // INIT
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  const ADMIN_EMAIL = "bios80@gmail.com";

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const addBtn = document.getElementById("addBtn");
  const list = document.getElementById("list");

  let currentUser = null;

  // LOGIN
  loginBtn.onclick = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  };

  logoutBtn.onclick = () => auth.signOut();

  auth.onAuthStateChanged(user => {
    currentUser = user;

    if (user) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline";
    } else {
      loginBtn.style.display = "inline";
      logoutBtn.style.display = "none";
    }
  });

  // ADD ENTRY
  addBtn.onclick = () => {
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
      alert("Read-only mode");
      return;
    }

    const puppy = document.getElementById("puppy").value;
    const weight = document.getElementById("weight").value;

    db.ref("entries").push({
      puppy,
      weight,
      date: new Date().toISOString()
    });

    document.getElementById("weight").value = "";
  };

  // REAL-TIME LISTENER
  db.ref("entries").on("value", snapshot => {
    list.innerHTML = "";

    const data = snapshot.val();
    if (!data) return;

    Object.values(data).forEach(e => {
      const li = document.createElement("li");
      li.textContent = `${e.puppy} - ${e.weight}g`;
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
