<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puppy Weight Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #efefec;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;
      --bg-warning: #faeeda;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-info: #0c447c;
      --text-success: #27500a;
      --text-danger: #791f1f;
      --text-warning: #633806;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --border-info: rgba(24,95,165,0.4);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #232321;
        --bg-info: #042c53;
        --bg-success: #173404;
        --bg-danger: #501313;
        --bg-warning: #412402;
        --text-primary: #f0efe8;
        --text-secondary: #b4b2a9;
        --text-info: #85b7eb;
        --text-success: #c0dd97;
        --text-danger: #f09595;
        --text-warning: #fac775;
        --border: rgba(255,255,255,0.12);
        --border-md: rgba(255,255,255,0.22);
        --border-info: rgba(133,183,235,0.4);
      }
    }

    body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 0 0 3rem; }

    .page-header { background: var(--bg-primary); border-bottom: 0.5px solid var(--border); padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 12px; }
    .page-header h1 { font-size: 20px; font-weight: 500; }
    .page-header p  { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .container { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; }

    .card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 1.25rem; }

    .tab-bar { display: flex; border-bottom: 0.5px solid var(--border); }
    .tab-item { padding: 12px 20px; font-size: 14px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none; transition: color 0.15s; }
    .tab-item.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
    .tab-item:hover:not(.active) { color: var(--text-primary); }

    .tab-content { padding: 1.25rem 1.5rem; }

    .section-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
    .section-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
    .form-group label { font-size: 12px; color: var(--text-secondary); }

    input, select {
      width: 100%; height: 36px; padding: 0 10px;
      border-radius: var(--radius-md); border: 0.5px solid var(--border-md);
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font); font-size: 14px; outline: none;
    }
    input:focus, select:focus { border-color: var(--text-info); box-shadow: 0 0 0 2px var(--bg-info); }

    .btn { height: 36px; padding: 0 18px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; transition: background 0.15s; }
    .btn-primary { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); font-weight: 500; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 12px; color: var(--text-secondary); font-weight: 400; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); }

    .del-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 14px; padding: 2px 7px; border-radius: 4px; }
    .del-btn:hover { background: var(--bg-danger); color: var(--text-danger); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; }
    .stat-value { font-size: 20px; font-weight: 500; }

    .alerts-wrap { margin-bottom: 1.25rem; }
    .alert-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: var(--radius-md); margin-bottom: 8px; font-size: 13px; }
    .alert-danger  { background: var(--bg-danger);  color: var(--text-danger); border: 0.5px solid rgba(121, 31, 31, 0.2); }
    .alert-warning { background: var(--bg-warning); color: var(--text-warning); border: 0.5px solid rgba(99, 56, 6, 0.2); }
    .alert-success { background: var(--bg-success); color: var(--text-success); border: 0.5px solid rgba(39, 80, 10, 0.2); }

    .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; }

    .chart-wrap { position: relative; width: 100%; height: 300px; }
    .chart-wrap-sm { position: relative; width: 100%; height: 220px; }

    .legend-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }

    .filter-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
    .filter-tab { padding: 5px 13px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .filter-tab.active { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); }

    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
    .milestone-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; background: var(--bg-success); color: var(--text-success); font-weight: 500; }

    @media (max-width: 560px) {
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div style="font-size:24px;">🐾</div>
  <div>
    <h1>Puppy Weight Tracker</h1>
    <p id="header-sub">Loading...</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('log')">Weight log</div>
      <div class="tab-item" onclick="switchTab('chart')">Growth chart</div>
      <div class="tab-item" onclick="switchTab('insights')">Insights</div>
    </div>

    <div id="tab-log" class="tab-content">
      <div class="section-title">Add weight entry</div>
      <div class="form-row">
        <div class="form-group">
          <label>Puppy</label>
          <select id="sel-puppy"></select>
        </div>
        <div class="form-group" style="max-width:170px;">
          <label>Date</label>
          <input type="date" id="inp-date">
        </div>
        <div class="form-group" style="max-width:150px;">
          <label>Weight (g)</label>
          <input type="number" id="inp-weight" placeholder="0.0" step="0.1">
        </div>
        <button class="btn btn-primary" onclick="addEntry()">Add entry</button>
      </div>
      <hr class="divider">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr><th>Date</th><th>Day</th><th>Puppy</th><th>Weight</th><th>Change</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="entries-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-chart" class="tab-content" style="display:none;">
      <div class="section-label">Filter</div>
      <div class="filter-tabs" id="chart-filter-tabs"></div>
      <div class="metrics" id="metrics-row"></div>
      <hr class="divider">
      <div class="section-label">Growth Curve (★ = doubled birth weight)</div>
      <div class="legend-row" id="chart-legend"></div>
      <div class="chart-wrap">
        <canvas id="growthChart"></canvas>
      </div>
      <hr class="divider">
      <div class="section-label">Daily Grams Gained</div>
      <div class="chart-wrap-sm">
        <canvas id="gainChart"></canvas>
      </div>
    </div>

    <div id="tab-insights" class="tab-content" style="display:none;">
      <div class="section-label">Litter Overview</div>
      <div class="stats-grid" id="stats-grid"></div>
      <hr class="divider">
      <div class="section-label">Health Monitoring (Most Recent vs Previous Day)</div>
      <div class="alerts-wrap" id="alerts-wrap"></div>
      <hr class="divider">
      <div class="section-label">2X Birth Weight Progress</div>
      <div id="milestones-wrap"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'puppy-tracker-v2';
const DAY1 = '2025-04-11'; // Litter Start Date

const PUPPIES = [
  { id: 1, name: 'Green',  gender: 'Male',   color: '#3a9e4a' },
  { id: 2, name: 'Pink',   gender: 'Female', color: '#e05fa0' },
  { id: 3, name: 'Orange', gender: 'Male',   color: '#e07820' },
  { id: 4, name: 'Blue',   gender: 'Male',   color: '#378ADD' },
  { id: 5, name: 'White',  gender: 'Female', color: '#888780' },
  { id: 6, name: 'Yellow', gender: 'Female', color: '#BA7517' },
  { id: 7, name: 'Red',    gender: 'Female', color: '#E24B4A' },
];

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
  entries: [],
  chartFilter: []
};

let growthChart = null, gainChart = null;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function allDates() { return [...new Set(state.entries.map(e => e.date))].sort(); }
function dayNum(d) { return Math.floor((new Date(d) - new Date(DAY1)) / 86400000) + 1; }
function genderIcon(g) { return g === 'Male' ? '♂' : '♀'; }

function addEntry() {
  const pid = parseInt(document.getElementById('sel-puppy').value);
  const date = document.getElementById('inp-date').value;
  const weight = parseFloat(document.getElementById('inp-weight').value);
  if (!pid || !date || !weight) return alert("Please enter all details.");

  const idx = state.entries.findIndex(e => e.puppyId === pid && e.date === date);
  if (idx > -1) state.entries[idx].weight = weight;
  else state.entries.push({ id: Date.now(), puppyId: pid, date, weight });

  save();
  document.getElementById('inp-weight').value = '';
  renderAll();
}

function renderEntries() {
  const body = document.getElementById('entries-body');
  const sorted = [...state.entries].sort((a,b) => b.date.localeCompare(a.date) || a.puppyId - b.puppyId);
  
  body.innerHTML = sorted.map(e => {
    const p = PUPPIES.find(x => x.id === e.puppyId);
    const prev = state.entries.filter(x => x.puppyId === e.puppyId && x.date < e.date).sort((a,b) => b.date.localeCompare(a.date))[0];
    let change = '-', badge = '';

    if (prev) {
      const diff = e.weight - prev.weight;
      const pct = (diff / prev.weight) * 100;
      change = `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}g`;
      
      if (diff < 0) badge = '<span style="color:var(--text-danger)">⚠ Loss</span>';
      else if (pct < 5) badge = '<span style="color:var(--text-warning)">! Low</span>';
      else badge = '<span style="color:var(--text-success)">✓ Good</span>';
    }

    return `<tr>
      <td>${e.date}</td>
      <td>Day ${dayNum(e.date)}</td>
      <td><span class="dot" style="background:${p.color}"></span> ${p.name}</td>
      <td><b>${e.weight}g</b></td>
      <td>${change}</td>
      <td>${badge}</td>
      <td><button class="del-btn" onclick="deleteEntry(${e.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function renderAlerts() {
  const wrap = document.getElementById('alerts-wrap');
  const dates = allDates();
  if (dates.length < 2) { wrap.innerHTML = '<div class="empty-state">Need 2 days of data for alerts.</div>'; return; }

  const latest = dates[dates.length - 1], prev = dates[dates.length - 2];
  const alerts = PUPPIES.map(p => {
    const e = state.entries.find(x => x.puppyId === p.id && x.date === latest);
    const ep = state.entries.find(x => x.puppyId === p.id && x.date === prev);
    if (!e || !ep) return null;
    const diff = e.weight - ep.weight, pct = (diff / ep.weight) * 100;

    if (diff < 0) return { type: 'danger', icon: '⚠', msg: `<strong>${p.name}</strong> lost ${Math.abs(diff)}g. Immediate attention required.`, color: p.color };
    if (pct < 5) return { type: 'warning', icon: '!', msg: `<strong>${p.name}</strong> gain is low (${pct.toFixed(1)}%). Monitor feeding.`, color: p.color };
    return { type: 'success', icon: '✓', msg: `<strong>${p.name}</strong> gained ${pct.toFixed(1)}%. Healthy growth.`, color: p.color };
  }).filter(Boolean).sort((a,b) => (a.type === 'danger' ? -1 : 1));

  wrap.innerHTML = alerts.map(a => `<div class="alert-item alert-${a.type}">${a.icon} ${a.msg}</div>`).join('');
}

function renderMilestones() {
  const wrap = document.getElementById('milestones-wrap');
  const rows = PUPPIES.map(p => {
    const pe = state.entries.filter(e => e.puppyId === p.id).sort((a,b) => a.date.localeCompare(b.date));
    if (!pe.length) return '';
    const birth = pe[0].weight, target = birth * 2, current = pe[pe.length-1].weight;
    const hit = pe.find(e => e.weight >= target);
    const pct = Math.min(100, (current / target) * 100).toFixed(0);
    return `<tr>
      <td><span class="dot" style="background:${p.color}"></span> ${p.name}</td>
      <td>${birth}g</td><td>${target}g</td>
      <td><div style="background:#eee; height:8px; border-radius:4px; width:100px;"><div style="background:var(--text-info); height:100%; width:${pct}%; border-radius:4px;"></div></div></td>
      <td>${hit ? `<span class="milestone-badge">★ Day ${dayNum(hit.date)}</span>` : pct + '%'}</td>
    </tr>`;
  });
  wrap.innerHTML = `<table class="data-table"><thead><tr><th>Puppy</th><th>Birth</th><th>Target</th><th>Progress</th><th>Status</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function renderCharts() {
  const dates = allDates();
  if (!dates.length) return;
  const ctx1 = document.getElementById('growthChart').getContext('2d');
  const ctx2 = document.getElementById('gainChart').getContext('2d');

  if (growthChart) growthChart.destroy();
  if (gainChart) gainChart.destroy();

  const datasets = PUPPIES.filter(p => !state.chartFilter.length || state.chartFilter.includes(p.id)).map(p => ({
    label: p.name, borderColor: p.color, backgroundColor: p.color,
    data: dates.map(d => {
      const e = state.entries.find(x => x.puppyId === p.id && x.date === d);
      return e ? e.weight : null;
    }),
    tension: 0.3, spanGaps: true
  }));

  growthChart = new Chart(ctx1, { type: 'line', data: { labels: dates.map(d => 'Day ' + dayNum(d)), datasets }, options: { responsive: true, maintainAspectRatio: false } });
  
  const gainLabels = dates.slice(1);
  const gainDatasets = datasets.map(ds => {
    const p = PUPPIES.find(x => x.name === ds.label);
    return {
      label: p.name, backgroundColor: p.color,
      data: gainLabels.map((d, i) => {
        const e = state.entries.find(x => x.puppyId === p.id && x.date === d);
        const ep = state.entries.find(x => x.puppyId === p.id && x.date === dates[i]);
        return (e && ep) ? (e.weight - ep.weight).toFixed(1) : 0;
      })
    };
  });

  gainChart = new Chart(ctx2, { type: 'bar', data: { labels: gainLabels.map(d => 'Day ' + dayNum(d)), datasets: gainDatasets }, options: { responsive: true, maintainAspectRatio: false } });
}

function switchTab(tab) {
  ['log', 'chart', 'insights'].forEach(t => document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none');
  document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase().includes(tab)));
  if (tab === 'chart') renderCharts();
  if (tab === 'insights') { renderAlerts(); renderMilestones(); renderStats(); }
}

function renderStats() {
  const grid = document.getElementById('stats-grid');
  const dates = allDates();
  if (!dates.length) return;
  const latest = dates[dates.length - 1];
  const ws = state.entries.filter(e => e.date === latest).map(e => e.weight);
  const avg = (ws.reduce((a, b) => a + b, 0) / ws.length).toFixed(1);
  grid.innerHTML = `
    <div class="stat-card"><div class="stat-label">Litter Avg</div><div class="stat-value">${avg}g</div></div>
    <div class="stat-card"><div class="stat-label">Total Weight</div><div class="stat-value">${ws.reduce((a,b)=>a+b,0).toFixed(0)}g</div></div>
    <div class="stat-card"><div class="stat-label">Days Old</div><div class="stat-value">${dayNum(latest)}</div></div>
  `;
}

function renderAll() {
  const sel = document.getElementById('sel-puppy');
  sel.innerHTML = PUPPIES.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  renderEntries();
  document.getElementById('header-sub').innerText = `Litter of 7 · Born ${DAY1}`;
}

function deleteEntry(id) { if(confirm("Delete?")) { state.entries = state.entries.filter(e => e.id !== id); save(); renderAll(); } }

document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
renderAll();
</script>
</body>
</html>
