<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Puppy Tracker</title>
</head>

<body style="font-family:sans-serif; padding:20px;">

<h2>🐾 Puppy Weight Tracker</h2>

<button id="loginBtn">Login with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<hr>

<select id="puppy">
  <option>Green</option>
  <option>Pink</option>
  <option>Orange</option>
  <option>Blue</option>
  <option>White</option>
  <option>Yellow</option>
  <option>Red</option>
</select>

<input type="number" id="weight" placeholder="Weight (g)">
<button id="addBtn">Add Entry</button>

<h3>Entries</h3>
<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDvL0emjzWd450LvuOCTNs-D3yUOlwy4UA",
  authDomain: "puppy-app-41bf0.firebaseapp.com",
  databaseURL: "https://puppy-app-41bf0-default-rtdb.firebaseio.com",
  projectId: "puppy-app-41bf0",
  appId: "1:958889040689:web:694feb88aca77cb2fbae10"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ADMIN_EMAIL = "bios80@gmail.com";

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const addBtn = document.getElementById("addBtn");
const list = document.getElementById("list");

let currentUser = null;

// LOGIN
loginBtn.onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// LOGOUT
logoutBtn.onclick = () => signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";
  } else {
    loginBtn.style.display = "inline";
    logoutBtn.style.display = "none";
  }
});

// ADD ENTRY
addBtn.onclick = () => {
  if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
    alert("Read-only mode");
    return;
  }

  const puppy = document.getElementById("puppy").value;
  const weight = document.getElementById("weight").value;

  push(ref(db, "entries"), {
    puppy,
    weight,
    date: new Date().toISOString()
  });

  document.getElementById("weight").value = "";
};

// REAL-TIME LISTENER
onValue(ref(db, "entries"), (snapshot) => {
  list.innerHTML = "";

  const data = snapshot.val();
  if (!data) return;

  Object.values(data).forEach(e => {
    const li = document.createElement("li");
    li.textContent = `${e.puppy} - ${e.weight}g`;
    list.appendChild(li);
  });
});

</script>

</body>
</html>
